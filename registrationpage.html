<!DOCTYPE html>
<html lang="sk">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registracia</title> 
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header id="header-placeholder"></header>

    <main class="background">
        <section class="login-page">
            <div class="login-card">
                <h1>Registracia</h1>
    
                <form>
                    <label for="email">Email</label>
                    <input type="email" id="email" />
    
                    <label for="password">Heslo</label>
                    <input type="password" id="password" />

                    <label for="secondpassword">Zopakujte heslo</label>
                    <input type="secondpassword" id="secondpassword" />

                    <label for="name">Meno</label>
                    <input type="name" id="name" />

                    <label for="surname">Priezvisko</label>
                    <input type="surname" id="surname" />

                    <label for="phonenum">Telefonne cislo</label>
                    <input type="phonenum" id="phonenum" />
    
                    <button type="submit">Zaregistrovat sa</button>
                </form>
            </div>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>

    <script>
        fetch('navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });

        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>
</body>
</html>
