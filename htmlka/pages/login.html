<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prihlásenie</title> 
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <header id="header-placeholder"></header>

    <main class="background">
        <section class="page-section">
            <div class="page-box">
                <h1 class="section-title">Prihlásenie</h1>
        
                <form>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="input-basic" placeholder="meno@priklad.sk" required>
                        </div>
        
                        <div class="form-group">
                            <label for="heslo">Heslo</label>
                            <input type="password" id="heslo" class="input-basic" placeholder="Zadajte heslo" required>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn-dark-custom w-100">Prihlásiť sa</button>
                        
                        <div class="mt-3 small">
                            <p>Nemáte ešte účet? <a href="registracia.html">Zaregistrujte sa</a></p>
                            <p><a href="#" class="text-muted">Zabudli ste heslo?</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>

    <script>
        // Načítanie komponentov z priečinka components (o úroveň vyššie)
        fetch('../components/navbar.html').then(res => res.text()).then(html => {
            document.getElementById('header-placeholder').innerHTML = html;
        });
        fetch('../components/footer.html').then(res => res.text()).then(html => {
            document.getElementById('footer-placeholder').innerHTML = html;
        });
    </script>
</body>
</html>
