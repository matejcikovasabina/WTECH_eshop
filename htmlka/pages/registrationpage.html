<!DOCTYPE html>
<html lang="sk">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registracia</title> 
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../style.css">

</head>
<body>
    <header id="header-placeholder"></header>

    <main class="background">
        <section class="login-page">
            <div class="form-card">
                <h1>Registracia</h1>
    
                <form>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com"/>
    
                    <label for="password">Heslo</label>
                    <input type="password" id="password" placeholder="••••••"/>

                    <label for="secondpassword">Zopakujte heslo</label>
                    <input type="password" id="secondpassword" placeholder="••••••" />

                    <label for="name">Meno</label>
                    <input type="name" id="name" placeholder="Maria"/>

                    <label for="surname">Priezvisko</label>
                    <input type="surname" id="surname" placeholder="Smith"/>

                    <label for="phonenum">Telefonne cislo</label>
                    <input type="phonenum" id="phonenum" placeholder="+421" />
    
                    <button type="submit">Zaregistrovat sa</button>
                </form>
            </div>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>

    <script>
        // Načítanie komponentov z priečinka components (o úroveň vyššie)
        fetch('../components/navbar.html').then(res => res.text()).then(html => {
            document.getElementById('header-placeholder').innerHTML = html;
        });
        fetch('../components/footer.html').then(res => res.text()).then(html => {
            document.getElementById('footer-placeholder').innerHTML = html;
        });
    </script>
</body>
</html>
