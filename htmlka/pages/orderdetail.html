<!DOCTYPE html>
<html lang="sk">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail objednávky</title> 
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <header id="header-placeholder"></header>
 
    <main class="background">
        <section class="page-section">
            <div class="page-box">
                <h1 class="section-title">Objednávka #345543</h1>
 
                <div class="order-detail-row">
                    <div class="order-detail-img circle-placeholder"></div>
                    <div class="order-detail-info">
                        <strong>Mila Debbie</strong>
                        <p>Freida McFadden</p>
                    </div>
                    <div class="order-detail-qty order-text">Počet kusov: 1</div>
                    <div class="order-detail-price order-text">16.00€</div>
                </div>
 
                <div class="order-detail-row">
                    <div class="order-detail-img circle-placeholder"></div>
                    <div class="order-detail-info">
                        <strong>Pomocnicka</strong>
                        <p>Freida McFadden</p>
                    </div>
                    <div class="order-detail-qty order-text">Počet kusov: 3</div>
                    <div class="order-detail-price order-text">45.00€</div>
                </div>
 
                <div class="order-detail-row">
                    <div class="order-detail-img circle-placeholder"></div>
                    <div class="order-detail-info">
                        <strong>Zivica</strong>
                        <p>Ane Riel</p>
                    </div>
                    <div class="order-detail-qty order-text">Počet kusov: 1</div>
                    <div class="order-detail-price order-text">6.70€</div>
                </div>
 
                <div class="order-detail-row">
                    <div class="order-detail-img circle-placeholder"></div>
                    <div class="order-detail-info">
                        <strong>Chlapec pri dverach</strong>
                        <p>Alex Dahl</p>
                    </div>
                    <div class="order-detail-qty order-text">Počet kusov: 1</div>
                    <div class="order-detail-price order-text">1.20€</div>
                </div>
            </div>
        </section>
    </main>
 
    <div id="footer-placeholder"></div>
 
    <script>
        fetch('../components/navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });
 
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>
</body>
</html>
