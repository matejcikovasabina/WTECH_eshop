<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editovať produkt - Admin</title>
    <link rel="stylesheet" href="../../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>
    <header id="header-placeholder"></header>

    <main class="background">
        <section class="page-section">
            <div class="admin-layout">

                <div class="profile-card admin-sidebar">
                    <h2 class="section-title">Admin panel</h2>
                    <a href="admin-pridat.html" class="btn-dark-custom">Pridať produkt</a>
                    <a href="admin-editovat.html" class="btn-dark-custom">Editovať produkt</a>
                    <a href="admin-vymazat.html" class="btn-dark-custom">Vymazať produkt</a>
                    <hr>
                    <a href="../profilepage.html" class="btn-dark-custom">← Späť na profil</a>
                </div>

                <div class="profile-card admin-main-content">
                    <h1 class="section-title">Editovať produkt</h1>

                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="hladat">Vyhľadať knihu podľa názvu</label>
                            <input type="text" id="hladat" placeholder="Zadajte názov knihy na úpravu...">
                        </div>
                        <div class="form-actions admin-vyhladat-button">
                            <button class="btn-dark-custom">Vyhľadať</button>
                        </div>
                    </div>

                    <hr class="mb-5">

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="e-nazov">Názov knihy *</label>
                            <input type="text" id="e-nazov" value="Malý princ">
                        </div>

                        <div class="form-group">
                            <label for="e-autor">Autor</label>
                            <input type="text" id="e-autor" value="Antoine de Saint-Exupéry">
                        </div>

                        <div class="form-group">
                            <label for="e-vazba">Väzba</label>
                            <input type="text" id="e-vazba" value="Pevná">
                        </div>

                        <div class="form-group">
                            <label for="e-rozmer">Rozmer</label>
                            <input type="text" id="e-rozmer" value="130 x 200 mm">
                        </div>

                        <div class="form-group">
                            <label for="e-hmotnost">Hmotnosť (g)</label>
                            <input type="text" id="e-hmotnost" value="350g">
                        </div>

                        <div class="form-group">
                            <label for="e-isbn">ISBN</label>
                            <input type="text" id="e-isbn" value="978-80-00-00000-0">
                        </div>

                        <div class="form-group">
                            <label for="e-rok">Rok vydania</label>
                            <input type="number" id="e-rok" value="2023">
                        </div>

                        <div class="form-group">
                            <label for="e-jazyk">Jazyk</label>
                            <input type="text" id="e-jazyk" value="Slovenský">
                        </div>

                        <div class="form-group">
                            <label for="e-vydavatel">Vydavateľstvo</label>
                            <input type="text" id="e-vydavatel" value="Mladé letá">
                        </div>

                        <div class="form-group">
                            <label for="vydavatel">Pocet na sklade</label>
                            <input type="text" id="pocetnasklade" value="5">
                        </div>

                        <div class="form-group full-width">
                            <label for="e-opis">Opis *</label>
                            <textarea id="e-opis" rows="5">Príbeh o malom princovi, ktorý cestuje z planéty na planétu...</textarea>
                        </div>

                        <div class="form-group full-width">
                            <label>Aktuálne fotografie</label>
                            <div class="image-preview-list">
                                <div class="image-preview-item"></div>
                                <div class="image-preview-item"></div>
                                <div class="image-preview-item"></div>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label for="e-foto">Nahradiť fotografie (vyberte nové súbory)</label>
                            <input type="file" id="e-foto" accept="image/*" multiple>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-dark-custom btn-save-changes">Uložiť zmeny</button>
                        <a href="admin.html" class="btn-dark-custom">Zrušiť</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        fetch('../../components/navbar.html').then(r => r.text()).then(h => document.getElementById('header-placeholder').innerHTML = h);
        fetch('../../components/footer.html').then(r => r.text()).then(h => document.getElementById('footer-placeholder').innerHTML = h);
    </script>
</body>
</html>
