<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopping cart</title>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <header id="header-placeholder"></header>

    <section class="container py-3">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
              <div class="d-flex flex-wrap justify-content-between text-center gap-3 small fw-semibold">
                  <a href="#" class="flex-fill text-primary border-bottom border-3 border-primary pb-2 text-decoration-none">
                    Košík
                  </a>
                  <div class="flex-fill text-muted border-bottom pb-2">
                      Doručenie
                  </div>
                  <div class="flex-fill text-muted border-bottom pb-2">
                      Platba
                  </div>
                  <div class="flex-fill text-muted border-bottom pb-2">
                      Sumár
                  </div>
              </div>
          </div>
      </div>
  </section>

    <main class="py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-10">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4 p-md-5">
                            <h1 class="h2 mb-4">Košík</h1>

                            <div class="row align-items-center gy-3 py-3 border-bottom">
                                <div class="col-12 col-md-2 col-lg-1">
                                    <img src="../../images/adults.webp" alt="Amerikáni" class="img-fluid rounded shadow-sm cart-img">
                                </div>

                                <div class="col-12 col-md-4 col-lg-4">
                                    <h3 class="h5 mb-1">
                                        <a href="#" class="text-decoration-none text-dark">Amerikáni</a>
                                    </h3>
                                    <p class="text-muted mb-0">Tomas Hudak</p>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <span class="badge text-bg-success">Na sklade</span>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <div class="btn-group" role="group" aria-label="Množstvo">
                                        <button type="button" class="btn btn-outline-secondary">-</button>
                                        <button type="button" class="btn btn-outline-secondary disabled">1</button>
                                        <button type="button" class="btn btn-outline-secondary">+</button>
                                    </div>
                                </div>

                                <div class="col-6 col-md-1 col-lg-1">
                                  <button class="btn btn-outline-danger btn-sm" aria-label="Odstrániť">
                                    <i class="bi bi-trash"></i>
                                  </button>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2 text-end">
                                    <strong class="fs-5">16.92€</strong>
                                </div>
                            </div>

                            <div class="row align-items-center gy-3 py-3 border-bottom">
                                <div class="col-12 col-md-2 col-lg-1">
                                    <img src="../../images/teenager.webp" alt="Amerikáni" class="img-fluid rounded shadow-sm cart-img">
                                </div>

                                <div class="col-12 col-md-4 col-lg-4">
                                    <h3 class="h5 mb-1">
                                        <a href="#" class="text-decoration-none text-dark">Mila Debbie</a>
                                    </h3>
                                    <p class="text-muted mb-0">Freida McFadden</p>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <span class="badge text-bg-success">Na sklade</span>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <div class="btn-group" role="group" aria-label="Množstvo">
                                        <button type="button" class="btn btn-outline-secondary">-</button>
                                        <button type="button" class="btn btn-outline-secondary disabled">1</button>
                                        <button type="button" class="btn btn-outline-secondary">+</button>
                                    </div>
                                </div>

                                <div class="col-6 col-md-1 col-lg-1">
                                  <button class="btn btn-outline-danger btn-sm" aria-label="Odstrániť">
                                    <i class="bi bi-trash"></i>
                                  </button>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2 text-end">
                                    <strong class="fs-5">16.00€</strong>
                                </div>
                            </div>

                            <div class="row align-items-center gy-3 py-3 border-bottom">
                                <div class="col-12 col-md-2 col-lg-1">
                                    <img src="../../images/zivotnystyl.webp" alt="Amerikáni" class="img-fluid rounded shadow-sm cart-img">
                                </div>

                                <div class="col-12 col-md-4 col-lg-4">
                                    <h3 class="h5 mb-1">
                                        <a href="#" class="text-decoration-none text-dark">Búrlivé výšiny</a>
                                    </h3>
                                    <p class="text-muted mb-0">Emily Bronte</p>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <span class="badge text-bg-success">Na sklade</span>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2">
                                    <div class="btn-group" role="group" aria-label="Množstvo">
                                        <button type="button" class="btn btn-outline-secondary">-</button>
                                        <button type="button" class="btn btn-outline-secondary disabled">1</button>
                                        <button type="button" class="btn btn-outline-secondary">+</button>
                                    </div>
                                </div>

                                <div class="col-6 col-md-1 col-lg-1">
                                  <button class="btn btn-outline-danger btn-sm" aria-label="Odstrániť">
                                    <i class="bi bi-trash"></i>
                                  </button>
                                </div>

                                <div class="col-6 col-md-2 col-lg-2 text-end">
                                    <strong class="fs-5">27.30€</strong>
                                </div>
                            </div>

                            <div class="row align-items-end pt-4 gy-3">
                                <div class="col-12 col-md-6">
                                    <div class="alert alert-success mb-0" role="alert">
                                        Doprava zadarmo pri objednávke nad 80 €
                                    </div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <div class="d-flex flex-column align-items-md-end gap-3">
                                        <div class="d-flex align-items-center gap-3 fs-4 fw-bold">
                                            <span>Spolu</span>
                                            <strong>60.22€</strong>
                                        </div>
                                        <button class="btn btn-primary btn-lg px-4">
                                            Pokračovať
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        fetch('../components/navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });

        fetch('../components/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>
</body>
</html>
