<!DOCTYPE html>
<html lang="sk">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil</title> 
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header-placeholder"></header>

    <main class="background">
        <section class="page-section">
            <div class="page-box">
                <h1 class="section-title">Profil</h1>
    
                <div class="profile-avatar circle-placeholder"></div>
    
                <div class="form-grid">
                    <div class="form-group">
                        <label for="meno">Meno</label>
                        <input type="text" id="meno" class="input-basic">
                    </div>
    
                    <div class="form-group">
                        <label for="priezvisko">Priezvisko</label>
                        <input type="text" id="priezvisko" class="input-basic">
                    </div>
    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="input-basic">
                    </div>
    
                    <div class="form-group">
                        <label for="telefon">Telefónne číslo</label>
                        <input type="text" id="telefon" class="input-basic">
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <div id="footer-placeholder"></div>

    <script>
        fetch('navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });

        fetch('footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>
</body>
</html>
